  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #10141e;
      background-size: 100% 100%;
      font-family: Arial, sans-serif;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    .splash-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #10141e;
    }

    .splash-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 132px;
      height: 52px;
      padding: 0 20px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, #23283a 0%, #171b29 100%);
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.14em;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }
  </style>
  <script id="splash-screen-script">
    window.__kessBoot = window.__kessBoot || {};
    window.__kessBoot.enableStartupLog =
      window.location.search.includes('startupLog=1') ||
      window.localStorage.getItem('startupLog') === '1';
    window.__kessBoot.startupLog = function (message) {
      if (window.__kessBoot.enableStartupLog) {
        console.log(message);
      }
    };
    window.__kessBoot.splashVisibleAt = performance.now();
    window.__kessBoot.startupLog("[startup] splash_visible at " + window.__kessBoot.splashVisibleAt.toFixed(1) + "ms");

    const navEntries = performance.getEntriesByType("navigation");
    if (navEntries && navEntries.length > 0) {
      const nav = navEntries[0];
      window.__kessBoot.startupLog("[startup] nav_response_start at " + nav.responseStart.toFixed(1) + "ms");
      window.__kessBoot.startupLog("[startup] nav_dom_content_loaded at " + nav.domContentLoadedEventEnd.toFixed(1) + "ms");
      window.__kessBoot.startupLog("[startup] nav_load_event_end at " + nav.loadEventEnd.toFixed(1) + "ms");
    }

    function removeSplashFromWeb() {
      const now = performance.now();
      window.__kessBoot.startupLog("[startup] splash_removed at " + now.toFixed(1) + "ms");
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <div id="splash" class="splash-shell">
    <div class="splash-logo">KESS</div>
  </div>
  
  
  
  
  
  
  
  <script src="flutter_bootstrap.js" async=""></script>
